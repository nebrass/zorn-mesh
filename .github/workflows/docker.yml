name: docker

# Builds and pushes the zornmesh Docker image to GHCR.
# - On v* tag: pushes :v0.1.0 and :latest
# - On main push: pushes :main
# - On PR: builds only (no push) to validate the Dockerfile

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, Linux, X64, zorn-mesh]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nebrass/zornmesh
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
